<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generate Monthly Invoice</title>
  </head>
  <body>
    <!-- Form Section -->
    <div class="card border-0 shadow-sm rounded-2">
      <div class="card-body p-4">
        <div class="row">
          <div class="col-12">
            <form class="row g-3">
              <!-- row 1 -->
              <div class="col-12 col-md-6">
                <label for="monthfrom" class="custom-label">
                  Month <strong class="text-danger">*</strong></label
                >
                <select class="custom-select" id="monthfrom" required>
                  <option value="">--Select--</option>
                  <option value="jan">Jan (01)</option>
                  <option value="feb">Feb (02)</option>
                </select>
              </div>

              <div class="col-12 col-md-6">
                <label for="fromyear" class="custom-label">
                  Year <strong class="text-danger">*</strong></label
                >
                <select class="custom-select" id="fromyear" required>
                  <option value="">--Select--</option>
                  <option value="2026">2026</option>
                  <option value="2025">2025</option>
                </select>
              </div>

              <div class="col-12 mt-4">
                <button type="submit" class="btn-view me-2">
                  View Invoice
                </button>
                <button type="reset" class="btn btn-info">
                  Generate Invoice
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- Generate Monthly Invoice Table -->
    <div class="custom-table-card">
      <div
        class="card-header bg-white border-bottom py-3 d-flex justify-content-between align-items-center"
      >
        <h6 class="table-header-text">Monthly Invoice</h6>
      </div>
      <div class="custom-table-card-body">
        <!-- Table -->
        <div class="custom-table-responsive" style="overflow-x: hidden">
          <table
            id="monthlyInvoiceTable"
            class="custom-table custom-table-bordered custom-align-middle custom-text-center custom-mb-0"
          >
            <thead class="custom-table-light">
              <tr>
                <th>S.No</th>
                <th><input class="custom-check-input" type="checkbox" /></th>
                <th>Invoice</th>
                <th>Merchant</th>
                <th>GST No</th>
                <th>Place Of Service</th>
                <th>GST Type</th>
                <th>Billing Amount</th>
                <th>CGST</th>
                <th>SGST</th>
                <th>IGST</th>
                <th>Total Billing Amount</th>
                <th>PDF</th>
              </tr>
            </thead>

            <tbody>
              <tr>
                <td class="text-muted">1</td>
                <td><input class="custom-check-input" type="checkbox" /></td>
                <td>QPay1001 / 24 - 25</td>
                <td>Sun Software Solutions Pvt Ltd</td>
                <td>UN</td>
                <td>Tamil Nadu</td>
                <td>GST</td>
                <td>730.43</td>
                <td>65.77</td>
                <td>65.77</td>
                <td>0.00</td>
                <td>861.97</td>
                <td>
                  <a href="#" class="action-link edit-link">Download </a>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <hr />
        <div class="col-12 mt-4">
          <button type="submit" class="btn btn-primary me-2">
            Generate PDF
          </button>
          <button type="reset" class="btn btn-info">Send Email</button>
        </div>
      </div>
    </div>

    <script>
      $(document).ready(function () {
        if ($.fn.DataTable.isDataTable("#monthlyInvoiceTable")) {
          $("#monthlyInvoiceTable").DataTable().destroy();
        }
        $("#monthlyInvoiceTable").DataTable({
          scrollX: true,
          language: {
            search: "Search:",
            lengthMenu: "Show _MENU_ entries",
          },
          columnDefs: [{ orderable: false, targets: 1 }],
          dom:
            "<'row mb-3'<'col-sm-12 col-md-6'l><'col-sm-12 col-md-6'f>>" +
            "<'row'<'col-sm-12'tr>>" +
            "<'row mt-3'<'col-sm-12 col-md-5'i><'col-sm-12 col-md-7'p>>",
        });
      });
    </script>
  </body>
</html>
