<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Merchant Menu Mapping</title>
  </head>
  <body>
    <div>

      <!-- top card -->
      <div class="card shadow-sm border mb-4 top-card-global">
        <div class="card-header py-3">
          <h6 class="fw-bold mb-1">Merchant Menu Mapping Management</h6>
          <small class="text-muted">
            You are here : Master >
            <strong class="text-dark">Merchant Menu Mapping</strong>
          </small>
        </div>
      </div>

      <!-- form box -->

      <div class="card border border-light shadow-sm mb-4 rounded-2">
        <div class="card-body p-4">
          <form class="row g-4">
            <!-- Merchant Select -->
            <div class="col-12">
              <div class="row align-items-end">
                <div class="col-12 col-md-6 mb-3 mb-md-0">
                  <label for="merchantSelect" class="custom-label">
                    Merchant <strong class="text-danger">*</strong>
                  </label>
                  <select class="custom-select" id="merchantSelect" required>
                    <option value="" selected disabled>--Select--</option>
                    <option value="1">Merchant A</option>
                    <option value="2">Merchant B</option>
                  </select>
                </div>
                <div class="col-12 col-md-6 text-md-end">
                  <button type="submit" class="btn btn-primary">
                    Get Logs
                  </button>
                </div>
              </div>
            </div>
          </form>
        </div>
      </div>

      <!-- Check boxes -->
      <div class="card border border-light shadow-sm mb-4 rounded-2 p-4">
        <div class="col-12 mb-3">
          <div
            class="d-flex flex-column flex-md-row align-items-start align-items-md-center justify-content-between gap-2"
          >
            <label for="merchantSelect" class="custom-label mb-0">
              Select Menu <strong class="text-danger">*</strong>
              <span class="fst-italic small fw-normal">
                (drag & drop to reorder)
              </span>
            </label>

            <div class="d-flex flex-sm-row gap-2">
              <button type="button" class="btn btn-outline-success">
                Select All
              </button>

              <button type="button" class="btn btn-outline-danger">
                Deselect All
              </button>
            </div>
          </div>
        </div>
        <div class="p-3 mt-1">
          <ul class="list-unstyled mb-0 d-flex flex-column gap-3">
            <li class="d-flex align-items-center gap-2" style="cursor: grab">
              <input
                class="custom-check-input mt-0"
                type="checkbox"
                id="smsPaymentLink"
              />
              <i class="bi bi-folder-fill text-warning fs-6"></i>
              <label
                class="custom-check-label fw-normal small text-dark"
                for="smsPaymentLink"
                >SMS Payment Link</label
              >
            </li>
            <li class="d-flex align-items-center gap-2" style="cursor: grab">
              <input
                class="custom-check-input mt-0"
                type="checkbox"
                id="settings"
              />
              <i class="bi bi-folder-fill text-warning fs-6"></i>
              <label
                class="custom-check-label fw-normal small text-dark"
                for="settings"
                >Settings</label
              >
            </li>
          </ul>
        </div>
        <hr />
        <div class="col-12 mt-3 d-flex gap-2">
          <button type="submit" class="btn btn-primary px-4">Submit</button>
        </div>
      </div>
    </div>
  </body>
</html>
