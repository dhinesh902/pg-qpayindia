<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reseller Commission Master</title>
  </head>
  <body>
    <div>

      <!-- Form Section -->
      <div class="card border-0 shadow-sm rounded-2">
        <div class="card-body p-4">
          <div class="row">
            <div class="col-12">
              <form class="row g-4">
                <!-- row 1 -->
                <div class="col-12 col-md-6">
                  <label class="custom-label"
                    >Reseller Name <strong class="text-danger">*</strong></label
                  >
                  <select class="custom-select" required>
                    <option value="" disabled selected>--Select--</option>
                    <option value="credit">BhoomiReseller</option>
                  </select>
                </div>

                <div class="col-12 col-md-6">
                  <label class="custom-label"
                    >Payment Type <strong class="text-danger">*</strong></label
                  >
                  <select class="custom-select" required>
                    <option value="" disabled selected>--Select--</option>
                    <option value="credit">Credit Card</option>
                  </select>
                </div>

                <label class="inner-title mb-0 mt-4">Amount Range</label>

                <div class="col-12 col-md-6">
                  <label class="custom-label"
                    >From <strong class="text-danger">*</strong></label
                  >
                  <input type="text" class="custom-input" required />
                </div>

                <div class="col-12 col-md-6">
                  <label class="custom-label"
                    >To <strong class="text-danger">*</strong></label
                  >
                  <input type="text" class="custom-input" required />
                </div>

                <!-- row 3 -->
                <div class="col-12 col-md-6">
                  <label class="custom-label"
                    >Reseller Commission Rate
                    <strong class="text-danger">*</strong></label
                  >
                  <input type="text" class="custom-input" required />
                </div>

                <div class="col-12 col-md-6">
                  <label class="custom-label"
                    ><strong class="text-danger">*</strong></label
                  >
                  <div class="d-flex flex-column gap-2 mt-1">
                    <div class="form-check">
                      <input
                        class="custom-check-input"
                        type="checkbox"
                        id="pct"
                      />
                      <label class="custom-check-label" for="pct"
                        >Percentage</label
                      >
                    </div>
                    <div class="form-check">
                      <input
                        class="custom-check-input"
                        type="checkbox"
                        id="flat"
                      />
                      <label class="custom-check-label" for="flat"
                        >Flat Rate</label
                      >
                    </div>
                  </div>
                </div>

                <div class="col-12 col-md-6">
                  <label class="custom-label"
                    >Status <strong class="text-danger">*</strong></label
                  >
                  <div class="d-flex flex-column gap-2 mt-1">
                    <div class="form-check">
                      <input
                        class="custom-check-input"
                        type="checkbox"
                        id="statusActive"
                      />
                      <label class="custom-check-label" for="statusActive"
                        >Active</label
                      >
                    </div>
                    <div class="form-check">
                      <input
                        class="custom-check-input"
                        type="checkbox"
                        id="statusDeactive"
                      />
                      <label class="custom-check-label" for="statusDeactive"
                        >Deactive</label
                      >
                    </div>
                  </div>
                </div>

                <div class="col-12 d-flex gap-2">
                  <button type="submit" class="btn btn-primary">Submit</button>
                  <button type="reset" class="btn btn-warning">Cancel</button>
                </div>
              </form>

              <!-- Download Section -->
              <div class="col-12 mt-5 mb-4">
                <hr class="text-muted opacity-25 m-0" />
              </div>

              <form class="row g-4">
                <div class="col-12 col-md-6">
                  <label class="custom-label"
                    >Download Commission Details
                    <strong class="text-danger">*</strong></label
                  >
                  <select class="custom-select" required>
                    <option value="" disabled selected>--Select--</option>
                  </select>
                </div>
                <div class="col-12">
                  <div class="horizontal-scroll d-flex gap-2 flex-nowrap pb-2">
                    <button
                      type="button"
                      class="btn btn-info flex-shrink-0 text-nowrap"
                    >
                      Download
                    </button>

                    <button
                      type="button"
                      class="btn btn-primary flex-shrink-0 text-nowrap"
                    >
                      Show Active Record(s)
                    </button>

                    <button
                      type="button"
                      class="btn btn-primary flex-shrink-0 text-nowrap"
                    >
                      Show Deactive Record(s)
                    </button>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>

      <!-- Data Table -->
      <div class="custom-table-card">
        <div class="custom-table-card-body">
          <!-- Table -->
          <div class="custom-table-responsive">
            <table
              id="resellerCommissionTable"
              class="custom-table custom-table-bordered custom-align-middle custom-text-center custom-mb-0"
            >
              <thead class="custom-table-light">
                <tr>
                  <th>S.No</th>
                  <th>Action</th>
                  <th>Reseller</th>
                  <th>Merchant</th>
                  <th>Payment Option</th>
                  <th>Brand</th>
                  <th>Amount From</th>
                  <th>Amount To</th>
                  <th>Reseller CommissionRate</th>
                  <th>Commission Type</th>
                  <th>From Date</th>
                  <th>To Date</th>
                  <th>Status</th>
                </tr>
              </thead>

              <tbody id="resellerCommissionTableBody">
                <tr>
                  <td>1</td>
                  <td>
                    <a href="#" class="action-link edit-link"> Edit </a>
                  </td>
                  <td>Srihari</td>
                  <td>ALL</td>
                  <td>Credit Card</td>
                  <td></td>
                  <td>1.00</td>
                  <td>100000.00</td>
                  <td>55.00</td>
                  <td>Percentage</td>
                  <td>26-11-2021</td>
                  <td></td>
                  <td class="status-active">Active</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script>
      $(document).ready(function () {
        if ($.fn.DataTable.isDataTable("#resellerCommissionTable")) {
          $("#resellerCommissionTable").DataTable().destroy();
        }
        $("#resellerCommissionTable").DataTable({
          scrollX: true,
          language: {
            search: "Search:",
            lengthMenu: "Show _MENU_ entries",
          },
          dom:
            "<'row mb-3'<'col-sm-12 col-md-6'l><'col-sm-12 col-md-6'f>>" +
            "<'row'<'col-sm-12'tr>>" +
            "<'row mt-3'<'col-sm-12 col-md-5'i><'col-sm-12 col-md-7'p>>",
        });
      });
    </script>
  </body>
</html>
