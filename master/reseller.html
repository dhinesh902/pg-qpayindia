<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reseller Master</title>
  </head>
  <body>
    <div>

      <!-- Form Section -->
      <div class="card border-0 shadow-sm rounded-2">
        <div class="card-body p-4">
          <div class="row">
            <div class="col-12">
              <form class="row g-3">
                <!-- row 1 -->
                <div class="col-12 col-md-6">
                  <label for="companyname" class="custom-label">
                    Company Name <strong class="text-danger">*</strong>
                  </label>
                  <input
                    type="text"
                    class="custom-input"
                    id="companyname"
                    required
                  />
                </div>
                <div class="col-12 col-md-6">
                  <label for="contactname" class="custom-label">
                    Contact Name <strong class="text-danger">*</strong>
                  </label>
                  <input
                    type="text"
                    class="custom-input"
                    id="contactname"
                    required
                  />
                </div>
                <div class="col-12 col-md-6">
                  <label for="email" class="custom-label">
                    Email <strong class="text-danger">*</strong>
                  </label>
                  <input type="text" class="custom-input" id="email" required />
                </div>

                <!-- row 2 -->
                <div class="col-12 col-md-6">
                  <label
                    for="mobilenumber"
                    class="custom-label"
                  >
                    Mobile Number <strong class="text-danger">*</strong>
                  </label>
                  <input
                    type="text"
                    class="custom-input"
                    id="mobilenumber"
                    maxlength="10"
                    oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                    required
                  />
                </div>
                <div class="col-12 col-md-6">
                  <label for="address" class="custom-label">
                    Address <strong class="text-danger">*</strong>
                  </label>
                  <textarea
                    class="custom-input"
                    rows="1"
                    id="address"
                    required
                  ></textarea>
                </div>
                <div class="col-12 col-md-6">
                  <label class="custom-label"
                    >State <strong class="text-danger">*</strong></label
                  >
                  <select class="custom-select" required>
                    <option value="" disabled selected>--Select--</option>
                    <option value="credit">Tamil Nadu</option>
                  </select>
                </div>

                <div class="col-12 mt-4">
                  <button type="submit" class="btn btn-primary me-2">
                    Submit
                  </button>
                  <button type="reset" class="btn btn-warning">Clear</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>

      <!-- Data Table -->
      <div class="custom-table-card">
        <div class="custom-table-card-body">
          <!-- Table -->
          <div class="custom-table-responsive">
            <table
              id="resellerTable"
              class="custom-table custom-table-bordered custom-align-middle custom-text-center custom-mb-0"
            >
              <thead class="custom-table-light">
                <tr>
                  <th>S.No</th>
                  <th>Action</th>
                  <th>Company Name</th>
                  <th>Contact Name</th>
                  <th>Email</th>
                  <th>Mobile</th>
                  <th>Address</th>
                  <th>State</th>
                </tr>
              </thead>

              <tbody id="resellerTableBody" >
                <tr>
                  <td>1</td>
                  <td>
                    <a
                      href="#"
                      class="action-link edit-link"
                    >
                      Edit
                    </a>
                  </td>
                  <td>BoomiReseller</td>
                  <td>Boomi</td>
                  <td>t_poomi@yahoo.com</td>
                  <td>9940620013</td>
                  <td>3/2, South Road</td>
                  <td>Tamil Nadu</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script>
      $(document).ready(function () {
        if ($.fn.DataTable.isDataTable("#resellerTable")) {
          $("#resellerTable").DataTable().destroy();
        }
        $("#resellerTable").DataTable({
          scrollX: true,
          language: {
            search: "Search:",
            lengthMenu: "Show _MENU_ entries",
          },
          dom:
            "<'row mb-3'<'col-sm-12 col-md-6'l><'col-sm-12 col-md-6'f>>" +
            "<'row'<'col-sm-12'tr>>" +
            "<'row mt-3'<'col-sm-12 col-md-5'i><'col-sm-12 col-md-7'p>>",
        });
      });
    </script>
  </body>
</html>
