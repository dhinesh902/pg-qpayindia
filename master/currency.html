<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Currency</title>
</head>

<body>
  <div>
    <h5 class="fw-bold mb-4">Currency</h5>

    <div class="card shadow-sm border mb-4" style="border-color: #c3e6cb !important">
      <div class="card-header py-3" style="background-color: #f0f9f3; border-bottom: 1px solid #c3e6cb">
        <h6 class="fw-bold mb-1" style="color: #1f753a">
          Currency Management
        </h6>
        <small class="text-muted">
          You are here : Master > <strong class="text-dark">Currency</strong>
        </small>
      </div>
      <div class="card-body p-4" style="background-color: #f9fcf9">
        <p class="text-muted mb-0">
          The details of currencies used in transactions can be added and
          edited.
        </p>
      </div>
    </div>

    <!-- Form Section -->
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <div class="row">
          <div class="col-12">
            <form class="row g-3">
              <div class="col-12 col-md-4">
                <label for="oldPassword" class="form-label fw-semibold small">
                  Currency Code
                </label>
                <input type="text" class="form-control" id="oldPassword" required />
              </div>

              <div class="col-12 col-md-4">
                <label for="newPassword" class="form-label fw-semibold small">
                  Currency Name
                </label>
                <input type="text" class="form-control" id="newPassword" required />
              </div>

              <div class="col-12 col-md-4">
                <label for="currencyStatus" class="form-label fw-semibold small">
                  Status
                </label>
                <select class="form-select" id="currencyStatus" required>
                  <option value="" disabled selected>Select Status</option>
                  <option value="active">Active</option>
                  <option value="inactive">DeActive</option>
                </select>
              </div>

              <div class="col-12 mt-4">
                <button type="submit" class="btn btn-primary me-2">
                  Submit
                </button>
                <button type="reset" class="btn btn-warning">Reset</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <div class="card border-0 shadow-sm mt-4">
      <div class="card-body">
        <!-- Table -->
        <div class="table-responsive rounded-3 shadow-sm bg-white">
          <table id="currencyTable" class="table table-hover align-middle mb-0" style="width: 100%;">
            <thead>
              <tr class="text-uppercase">
                <th class="py-2 px-3 border-0">SI.No</th>
                <th class="py-2 px-3 border-0">Action</th>
                <th class="py-2 px-3 border-0">Currency Code</th>
                <th class="py-2 px-3 border-0">Currency Name</th>
                <th class="py-2 px-3 border-0">Status</th>
              </tr>
            </thead>

            <tbody id="currencyTableBody">
              <tr>
                <td class="py-2 px-3">1</td>
                <td class="py-2 px-3">
                  <a href="#" class="me-3" style="
                        text-decoration: none;
                        color: #0d6efd;
                        cursor: pointer;
                      ">
                    Edit
                  </a>
                  <a href="#" style="
                        text-decoration: none;
                        color: #fd0d0d;
                        cursor: pointer;
                      ">
                    Delete
                  </a>
                </td>
                <td class="py-2 px-3">INR</td>
                <td class="py-2 px-3">Indian Rupee</td>
                <td class="py-2 px-3" style="font-weight: 500; color: #16a34a">
                  Active
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    $(document).ready(function () {
      if (!$.fn.DataTable.isDataTable('#currencyTable')) {
        $('#currencyTable').DataTable({
          responsive: true,
          lengthMenu: [10, 20, 50],
          language: {
            search: "_INPUT_",
            searchPlaceholder: "Search currencies...",
            lengthMenu: "Show _MENU_ entries"
          },
          dom: '<"row align-items-center mb-3"<"col-md-6 mb-2 mb-md-0"l><"col-md-6 d-flex justify-content-md-end"f>>' +
            '<"row"<"col-12"tr>>' +
            '<"row align-items-center mt-3"<"col-md-6 mb-2 mb-md-0"i><"col-md-6"p>>'
        });
      }
    });
  </script>
</body>

</html>
