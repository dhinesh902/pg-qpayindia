<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency</title>
  </head>

  <body>
    <div>
      <div class="card shadow-sm border mb-4 top-card-global">
        <div class="card-header py-3">
          <h6 class="fw-bold mb-1">Currency Management</h6>
          <small class="text-muted">
            You are here : Master > <strong class="text-dark">Currency</strong>
          </small>
        </div>
        <div class="card-body p-4">
          <p class="title">
            The details of currencies used in transactions can be added and
            edited.
          </p>
        </div>
      </div>

      <!-- Form Section -->
      <div class="card border-0 shadow-sm rounded-2">
        <div class="card-body p-4">
          <div class="row">
            <div class="col-12">
              <form class="row g-3">
                <div class="col-12 col-md-6">
                  <label for="oldPassword" class="custom-label">
                    Currency Code
                  </label>
                  <input
                    type="text"
                    class="custom-input"
                    id="oldPassword"
                    required
                  />
                </div>

                <div class="col-12 col-md-6">
                  <label for="newPassword" class="custom-label">
                    Currency Name
                  </label>
                  <input
                    type="text"
                    class="custom-input"
                    id="newPassword"
                    required
                  />
                </div>

                <div class="col-12 col-md-6">
                  <label for="currencyStatus" class="custom-label">
                    Status
                  </label>
                  <select class="custom-select" id="currencyStatus" required>
                    <option value="active">Active</option>
                    <option value="inactive">DeActive</option>
                  </select>
                </div>

                <div class="col-12 mt-4">
                  <button type="submit" class="btn btn-primary me-2">
                    Submit
                  </button>
                  <button type="reset" class="btn btn-warning">Reset</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>

      <div class="custom-table-card">
        <div class="custom-table-card-body">
          <!-- Table -->
          <div class="custom-table-responsive">
            <table
              id="currencyTable"
              class="custom-table custom-table-bordered custom-align-middle custom-text-center custom-mb-0"
            >
              <thead class="custom-table-light">
                <tr>
                  <th>S.No</th>
                  <th>Action</th>
                  <th>Currency Code</th>
                  <th>Currency Name</th>
                  <th>Status</th>
                </tr>
              </thead>

              <tbody id="currencyTableBody">
                <tr>
                  <td>1</td>
                  <td>
                    <a href="#" class="action-link edit-link"> Edit </a>
                    <a href="#" class="action-link delete-link"> Delete </a>
                  </td>
                  <td>INR</td>
                  <td>Indian Rupee</td>
                  <td class="status-active">Active</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script>
      $(document).ready(function () {
        if ($.fn.DataTable.isDataTable("#currencyTable")) {
          $("#currencyTable").DataTable().destroy();
        }
        $("#currencyTable").DataTable({
          scrollX: true,
          language: {
            search: "Search:",
            lengthMenu: "Show _MENU_ entries",
          },
          dom:
            "<'row mb-3'<'col-sm-12 col-md-6'l><'col-sm-12 col-md-6'f>>" +
            "<'row'<'col-sm-12'tr>>" +
            "<'row mt-3'<'col-sm-12 col-md-5'i><'col-sm-12 col-md-7'p>>",
        });
      });
    </script>
  </body>
</html>
