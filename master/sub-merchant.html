<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sub Merchant</title>
  </head>
  <body>
    <div>
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="fw-bold mb-0">Bank - Edit</h5>
      </div>
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <form class="row g-3">
            <!-- Row 1 -->
            <div class="col-12 col-md-4">
              <label class="form-label fw-semibold small"
                >Sub Merchant Name <strong class="text-danger">*</strong></label
              >
              <input type="text" class="form-control" required />
            </div>

            <div class="col-12 col-md-4">
              <label class="form-label fw-semibold small"
                >Sub Merchant ID <strong class="text-danger">*</strong></label
              >
              <input type="text" class="form-control" required />
            </div>

            <div class="col-12 col-md-4">
              <label class="form-label fw-semibold small"
                >Merchant Name<strong class="text-danger">*</strong></label
              >
              <select class="form-select" required>
                <option value="" disabled selected>Select Merchant</option>
                <option value="1">Merchant A</option>
                <option value="2">Merchant B</option>
              </select>
            </div>

            <div class="col-12 col-md-4">
              <label class="form-label fw-semibold small"
                >Industry Type<strong class="text-danger">*</strong></label
              >
              <select class="form-select" required>
                <option value="" disabled selected>Select Industry</option>
                <option value="1">Education</option>
                <option value="2">Texttiles</option>
              </select>
            </div>

            <!-- Row 2 -->
            <div class="col-12 col-md-4">
              <label class="form-label fw-semibold small"
                >Sector <strong class="text-danger">*</strong></label
              >
              <input type="text" class="form-control" required />
            </div>

            <div class="col-12 col-md-4">
              <label class="form-label fw-semibold small"
                >Address Line1 <strong class="text-danger">*</strong></label
              >
              <input type="text" class="form-control" required />
            </div>

            <!-- Row 3 -->

            <div class="col-12 col-md-4">
              <label class="form-label fw-semibold small"
                >Address Line 2 <strong class="text-danger">*</strong></label
              >
              <input type="text" class="form-control" required />
            </div>

            <div class="col-12 col-md-4">
              <label class="form-label fw-semibold small"
                >City <strong class="text-danger">*</strong></label
              >
              <input type="text" class="form-control" required />
            </div>

            <div class="col-12 col-md-4">
              <label class="form-label fw-semibold small">State</label>
              <select class="form-select" required>
                <option value="" disabled selected>Select State</option>
                <option value="credit">Tamil Nadu</option>
              </select>
            </div>

            <!-- Row 4 -->
            <div class="col-12 col-md-4">
              <label class="form-label fw-semibold small"
                >Country <strong class="text-danger">*</strong></label
              >
              <input type="text" class="form-control" required />
            </div>

            <div class="col-12 col-md-4">
              <label class="form-label fw-semibold small"
                >Zipcode <strong class="text-danger">*</strong></label
              >
              <input type="text" class="form-control" required maxlength="6" />
            </div>

            <div class="col-12 col-md-4">
              <label class="form-label fw-semibold small"
                >Mail ID <strong class="text-danger">*</strong></label
              >
              <input type="text" class="form-control" required />
            </div>

            <!-- Row 4 -->
            <div class="col-12 col-md-4">
              <label class="form-label fw-semibold small"
                >Phone No <strong class="text-danger">*</strong></label
              >
              <input type="text" class="form-control" required />
            </div>

            <div class="col-12 col-md-4">
              <label class="form-label fw-semibold small"
                >FAX <strong class="text-danger">*</strong></label
              >
              <input type="text" class="form-control" required />
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label fw-semibold small"
                >Business Description
                <strong class="text-danger">*</strong></label
              >
              <input type="text" class="form-control" required />
            </div>

            <!-- Row 5 -->
            <div class="col-12 col-md-4">
              <label class="form-label fw-semibold small"
                >URL <strong class="text-danger">*</strong></label
              >
              <input type="text" class="form-control" required />
            </div>

            <div class="col-12 col-md-4">
              <label class="form-label fw-semibold small"
                >Account Holder Name
                <strong class="text-danger">*</strong></label
              >
              <input type="text" class="form-control" required />
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label fw-semibold small"
                >Bank Name <strong class="text-danger">*</strong></label
              >
              <input type="text" class="form-control" required />
            </div>

            <!-- Row 6 -->
            <div class="col-12 col-md-4">
              <label class="form-label fw-semibold small"
                >IFSC Code <strong class="text-danger">*</strong></label
              >
              <input type="text" class="form-control" required />
            </div>

            <div class="col-12 col-md-4">
              <label class="form-label fw-semibold small"
                >Bank Account Number
                <strong class="text-danger">*</strong></label
              >
              <input type="text" class="form-control" required />
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label fw-semibold small"
                >Live Date <strong class="text-danger">*</strong></label
              >
              <input type="text" class="form-control" required />
            </div>

            <!-- Row 7 -->
            <div class="col-12 col-md-4">
              <label class="form-label fw-semibold small"
                >GST Number <strong class="text-danger">*</strong></label
              >
              <input type="text" class="form-control" required />
            </div>

            <div class="col-12 col-md-4">
              <label class="form-label fw-semibold small">Status</label>
              <select class="form-select" required>
                <option value="" disabled selected>Select Status</option>
                <option value="credit">Active</option>
                <option value="credit">Deactive</option>
                <option value="credit">Temprory Block</option>
              </select>
            </div>

            <div class="col-12 col-md-4">
              <label class="form-label fw-semibold small"
                >Average Ticket Size<strong class="text-danger"
                  >*</strong
                ></label
              >
              <input type="text" class="form-control" required />
            </div>

            <!-- Row 8 -->
            <div class="col-12 col-md-4">
              <label class="form-label fw-semibold small"
                >Expected Monthly Volume<strong class="text-danger"
                  >*</strong
                ></label
              >
              <input type="text" class="form-control" required />
            </div>

            <div class="col-12 col-md-4">
              <label class="form-label fw-semibold small"
                >Bank Account Number
                <strong class="text-danger">*</strong></label
              >
              <input type="text" class="form-control" required />
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label fw-semibold small"
                >Live Date <strong class="text-danger">*</strong></label
              >
              <input type="text" class="form-control" required />
            </div>

            <!-- Form Actions -->
            <div class="col-12 mt-4 d-flex gap-2">
              <button type="submit" class="btn btn-primary">Submit</button>
              <button type="reset" class="btn btn-warning text-dark">
                Cancel
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
