<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reseller Fund Transfer Details</title>
  </head>

  <body>
    <div>
      <!-- Form Section -->
      <div class="card border-0 shadow-sm rounded-2">
        <div class="card-body p-4">
          <div class="row">
            <div class="col-12">
              <form class="row g-3">
                <div class="col-12 col-md-6">
                  <label for="resellername" class="custom-label">
                    Reseller Name
                  </label>
                  <select class="custom-select" id="resellername" required>
                    <option value="active">BhoomiReseller</option>
                  </select>
                </div>
                <div class="col-12 col-md-6">
                  <label for="taxtype" class="custom-label">
                    Select Tax Type
                  </label>
                  <select class="custom-select" id="taxtype" required>
                    <option value="active">GST</option>
                  </select>
                </div>

                <div class="col-12 col-md-6">
                  <label for="startdate" class="custom-label">
                    Pending Settlement Start Date
                  </label>
                  <input
                    type="date"
                    class="custom-input"
                    id="startdate"
                    readonly
                  />
                </div>

                <div class="col-12 col-md-6">
                  <label for="enddate" class="custom-label">
                    Pending Settlement End Date
                  </label>
                  <input
                    type="date"
                    class="custom-input"
                    id="enddate"
                    required
                  />
                </div>

                <div class="col-12 mt-4">
                  <button type="submit" class="btn btn-primary me-2">
                    Get Settlement Data
                  </button>
                </div>
              </form>

              <form class="row g-3 mt-4">
                <div class="col-12 col-md-6">
                  <label for="amount" class="custom-label">
                    Settlement Amount (INR)
                  </label>
                  <input
                    type="text"
                    class="custom-input"
                    id="amount"
                    readonly
                  />
                </div>

                <div class="col-12 col-md-6">
                  <label for="transferdate" class="custom-label">
                    Select Fund Transfer Date
                  </label>
                  <input
                    type="date"
                    class="custom-input"
                    id="transferdate"
                    required
                  />
                </div>

                <div class="col-12 mt-4">
                  <button type="submit" class="btn btn-primary me-2">
                    Submit
                  </button>
                  <button type="submit" class="btn btn-info">Download</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>

      <div class="custom-table-card">
        <div class="custom-table-card-body">
          <!-- Table -->
          <div class="custom-table-responsive">
            <table
              id="currencyTable"
              class="custom-table custom-table-bordered custom-align-middle custom-text-center custom-mb-0"
            >
              <thead class="custom-table-light">
                <tr>
                  <th>S.No</th>
                  <th>Action</th>
                  <th>Reseller Name</th>
                  <th>Settlement Start Date</th>
                  <th>Settlement End Date</th>
                  <th>Tax Type</th>
                  <th>Transfered Amount</th>
                  <th>Fund Transfer Date</th>
                </tr>
              </thead>

              <tbody id="currencyTableBody">
                <tr>
                  <td>1</td>
                  <td></td>
                  <td>Galaxy Software Park</td>
                  <td>2/28/2021 12:00:00 AM</td>
                  <td>7/3/2024 12:00:00 AM</td>
                  <td>GST</td>
                  <td>15315.68</td>
                  <td>30/10/2024</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script>
      $(document).ready(function () {
        if ($.fn.DataTable.isDataTable("#currencyTable")) {
          $("#currencyTable").DataTable().destroy();
        }
        $("#currencyTable").DataTable({
          scrollX: true,
          language: {
            search: "Search:",
            lengthMenu: "Show _MENU_ entries",
          },
          dom:
            "<'row mb-3'<'col-sm-12 col-md-6'l><'col-sm-12 col-md-6'f>>" +
            "<'row'<'col-sm-12'tr>>" +
            "<'row mt-3'<'col-sm-12 col-md-5'i><'col-sm-12 col-md-7'p>>",
        });
      });
    </script>
  </body>
</html>
