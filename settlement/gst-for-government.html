<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GST Report Government</title>
  </head>

  <body>
    <div>
      <!-- Form Section -->
      <div class="card border-0 shadow-sm rounded-2">
        <div class="card-body p-4">
          <div class="row">
            <div class="col-12">
              <form class="row g-3">
                <div class="col-12 col-md-6">
                  <label for="merchantName" class="custom-label">Month</label>
                  <select class="custom-select" id="merchantName">
                    <option value="all">--Select--</option>
                    <option value="m1">Jan</option>
                    <option value="m2">Feb</option>
                  </select>
                </div>

                <div class="col-12 col-md-6">
                  <label for="merchantName" class="custom-label">Year</label>
                  <select class="custom-select" id="merchantName">
                    <option value="all">--Select--</option>
                    <option value="m1">2025</option>
                    <option value="m2">2026</option>
                  </select>
                </div>

                <div class="col-12 mt-4">
                  <button type="submit" class="btn btn-info me-2">
                    Download
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
