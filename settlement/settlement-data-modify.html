<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Commission mismatch</title>
  </head>

  <body>
    <div>
      <!-- Form Section -->
      <div class="card border-0 shadow-sm rounded-2">
        <div class="card-body p-4">
          <div class="row">
            <div class="col-12">
              <form class="row g-3">
                <div class="col-12 col-md-6">
                  <label for="qpayId" class="custom-label">
                    QPay Id <strong class="text-danger">*</strong></label
                  >
                  <input
                    type="text"
                    class="custom-input"
                    id="qpayId"
                    required
                  />
                </div>

                <div class="col-12 mt-4">
                  <button type="submit" class="btn btn-primary me-2">
                    Submit
                  </button>
                  <button type="reset" class="btn btn-warning">Clear</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
