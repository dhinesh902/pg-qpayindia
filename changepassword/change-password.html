<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Password</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <div class="m-2">
      <h5 class="fw-bold mb-4">Change Password</h5>

      <!-- Password Notice Card -->
      <div class="card border-0 shadow-sm mb-4 overflow-hidden">
        <!-- Header -->
        <div
          class="p-3 text-white"
          style="background: linear-gradient(135deg, #28666e, #3f8a94)"
        >
          <div class="d-flex align-items-center">
            <div>
              <h6 class="fw-bold mb-1">Password Expiration Notice</h6>

              <small>
                Please enter the new password. Your password expires every 60
                days.
              </small>
            </div>
          </div>
        </div>

        <!-- Body -->
        <div class="card-body p-4 bg-white">
          <div class="d-flex align-items-center mb-3">
            <div>
              <p class="text-muted mb-0">
                Please create a new password for your account
                <strong>tirupoomi</strong>.
              </p>
            </div>
          </div>

          <div
            class="d-flex justify-content-between align-items-center rounded-3 p-3"
            style="background: #fff8e1; border-left: 5px solid #ffc107"
          >
            <span class="fw-semibold"> Current Password Age </span>

            <span class="badge bg-danger fs-6 px-3 py-2"> 38 Days </span>
          </div>
        </div>
      </div>

      <!-- Form Section -->
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <div class="row">
            <div class="col-12 col-md-8 col-lg-6 col-xl-5 col-xxl-4">
              <form>
                <div class="mb-3">
                  <label for="oldPassword" class="form-label fw-semibold small">
                    Old Password
                    <strong class="text-danger">*</strong>
                  </label>

                  <input
                    type="password"
                    class="form-control"
                    id="oldPassword"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label for="newPassword" class="form-label fw-semibold small">
                    New Password
                    <strong class="text-danger">*</strong>
                  </label>

                  <input
                    type="password"
                    class="form-control"
                    id="newPassword"
                    required
                  />
                </div>

                <div class="mb-4">
                  <label
                    for="confirmPassword"
                    class="form-label fw-semibold small"
                  >
                    Confirm Password
                    <strong class="text-danger">*</strong>
                  </label>

                  <input
                    type="password"
                    class="form-control"
                    id="confirmPassword"
                    required
                  />
                </div>

                <button type="submit" class="btn btn-primary px-4">
                  Submit
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
