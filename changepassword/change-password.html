<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Password</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>

  <body>
    <div class="m-2">
      <!-- Password Notice Card -->
      <div class="card shadow-sm border mb-4 top-card-global">
        <div class="card-header py-3">
          <h6 class="text-muted">Password Expiration Notice</h6>
          <small class="text-muted">
            Please enter the new password. Your password expires every 60 days.
          </small>
        </div>
        <div class="card-body p-4">
          <p class="title">
            Please create a new password for your account
            <strong>tirupoomi</strong>.
          </p>
          <div class="d-flex justify-content-between align-items-center">
            <span class="fw-semibold text-dark">Current Password Age</span>
            <span
              class="badge fs-6 px-3 py-2"
              style="background-color: #ff0000; color: white"
              >38 Days</span
            >
          </div>
        </div>
      </div>

      <!-- Form Section -->
      <div class="card border-0 shadow-sm rounded-2">
        <div class="card-body p-4">
          <div class="row">
            <div class="col-12 col-md-8 col-lg-6 col-xl-5 col-xxl-4">
              <form>
                <div class="mb-3">
                  <label for="oldPassword" class="custom-label">
                    Old Password
                    <strong class="text-danger">*</strong>
                  </label>

                  <input
                    type="password"
                    class="custom-input"
                    id="oldPassword"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label for="newPassword" class="custom-label">
                    New Password
                    <strong class="text-danger">*</strong>
                  </label>

                  <input
                    type="password"
                    class="custom-input"
                    id="newPassword"
                    required
                  />
                </div>

                <div class="mb-4">
                  <label for="confirmPassword" class="custom-label">
                    Confirm Password
                    <strong class="text-danger">*</strong>
                  </label>

                  <input
                    type="password"
                    class="custom-input"
                    id="confirmPassword"
                    required
                  />
                </div>

                <button type="submit" class="btn btn-primary px-4">
                  Submit
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
